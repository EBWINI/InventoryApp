name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Restore NuGet packages
        run: dotnet restore -f net10.0-ios

      - name: Build for iOS
        run: dotnet build -f net10.0-ios -c Release --no-restore

      - name: Publish iOS App Bundle
        run: dotnet publish -f net10.0-ios -c Release --no-build -o publish-ios

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-iOS
          path: publish-ios/
          retention-days: 7
