name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 (pinned)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.100'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios --skip-manifest-update

      - name: Select Xcode 26.0.1
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Restore (iOS only)
        run: dotnet restore -p:TargetFramework=net9.0-ios

      - name: Build for iOS
        run: dotnet build -f net9.0-ios -c Release --no-restore -p:MtouchLink=None -p:MtouchUseLlvm=false

      - name: Publish iOS App Bundle
        run: dotnet publish -f net9.0-ios -c Release --no-build -o publish-ios -p:ArchiveOnBuild=true

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-iOS
          path: publish-ios/
          retention-days: 7
