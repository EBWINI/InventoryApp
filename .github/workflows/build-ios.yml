name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 (pinned)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.100'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios --skip-manifest-update

      - name: Select Xcode 26.0.1
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Restore (iOS only, with RID)
        run: dotnet restore -p:TargetFramework=net9.0-ios -p:RuntimeIdentifier=ios-arm64

      - name: Build for iOS (unsigned)
        run: dotnet build -f net9.0-ios -c Release --no-restore -p:RuntimeIdentifier=ios-arm64 -p:MtouchLink=None -p:MtouchUseLlvm=false -p:CodesignKey="" -p:CodesignProvision="" -p:CodesignRequireProvisioningProfile=false

      - name: Create unsigned IPA
        run: |
          APP_PATH="bin/Release/net9.0-ios/ios-arm64/InventoryApp.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p publish-ios/Payload
            cp -R "$APP_PATH" publish-ios/Payload/
            cd publish-ios
            zip -r ../InventoryApp-iOS.ipa Payload/
            cd ..
            ls -la InventoryApp-iOS.ipa
          else
            echo "ERROR: .app bundle not found at $APP_PATH"
            ls -la bin/Release/net9.0-ios/ios-arm64/ 2>/dev/null || echo "bin check done"
          fi

      - name: Upload iOS App (unsigned IPA)
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-iOS
          path: InventoryApp-iOS.ipa
          retention-days: 7

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-iOS
          path: publish-ios/
          retention-days: 7
